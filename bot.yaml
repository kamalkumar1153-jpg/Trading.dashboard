name: Indian Market Live Update

on:
  schedule:
    # सोमवार से शुक्रवार, हर 15 मिनट में (सुबह 3:45 UTC से दोपहर 10:00 UTC तक)
    # यह IST सुबह 9:15 से दोपहर 3:30 तक कवर करेगा
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch: # बटन दबाकर खुद भी चला सकते हैं

jobs:
  update-market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install yfinance pandas_ta

      - name: Run Market Engine
        run: python main.py
