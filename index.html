<script>
    async function updateLogic() {
        const sigText = document.getElementById('sig-text');
        const targetPts = document.getElementById('target-pts');

        try {
            // Humne pichle 1 din ka full range data mangwaya hai
            const urlN = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/^NSEI?interval=15m&range=1d');
            const urlS = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/^BSESN');

            const [resN, resS] = await Promise.all([fetch(urlN), fetch(urlS)]);
            const nData = JSON.parse((await resN.json()).contents).chart.result[0];
            const sData = JSON.parse((await resS.json()).contents).chart.result[0];

            const nCurr = nData.meta.regularMarketPrice;
            const sCurr = sData.meta.regularMarketPrice;
            
            document.getElementById('n-price').innerText = nCurr.toLocaleString('en-IN');
            document.getElementById('s-price').innerText = sCurr.toLocaleString('en-IN');

            // Agar market band hai, toh last calculation yahan se hogi
            const nHist = nData.indicators.quote[0].close;
            const nPrev = nHist[nHist.length - 2] || nCurr;
            const sHist = sData.indicators.quote[0].close;
            const sPrev = sHist[sHist.length - 2] || sCurr;

            if (nCurr > nPrev && sCurr > sPrev) {
                sigText.innerText = "↑ STRONG BUY";
                sigText.style.color = "#10b981";
                targetPts.innerText = "Momentum: Bullish";
            } else if (nCurr < nPrev && sCurr < sPrev) {
                sigText.innerText = "↓ STRONG SELL";
                sigText.style.color = "#ef4444";
                targetPts.innerText = "Momentum: Bearish";
            } else {
                sigText.innerText = "⚠ WAIT / NO TRADE";
                sigText.style.color = "#fbbf24";
                targetPts.innerText = "Indices are Diverging";
            }

        } catch (e) {
            console.log("Waiting for Market Open...");
        }
    }
    window.onload = updateLogic;
    setInterval(updateLogic, 30000);
</script>
