<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V4.1 Fixed</title>
    <style>
        :root { --bg: #0b1120; --card: #1e293b; --accent: #00f2ff; --up: #10b981; --down: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { width: 95%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h2 { color: var(--accent); font-size: 1.1rem; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        .market-box { background: #0f172a; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid #334155; }
        .data-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .label { color: #94a3b8; font-size: 0.9rem; font-weight: bold; }
        .price { font-family: 'monospace'; font-size: 1.4rem; font-weight: bold; }
        .signal { font-size: 1.2rem; font-weight: 800; text-align: center; margin-top: 10px; }
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2>AI PRO TERMINAL V4.1</h2>
        
        <div class="market-box" id="n-card">
            <div class="data-header"><span class="label">NIFTY 50</span><span class="price" id="n-price">---</span></div>
            <div class="signal" id="n-sig">ANALYZING...</div>
        </div>

        <div class="market-box" id="s-card">
            <div class="data-header"><span class="label">SENSEX</span><span class="price" id="s-price">---</span></div>
            <div class="signal" id="s-sig">ANALYZING...</div>
        </div>

        <button class="btn" onclick="updateAll()">REFRESH LIVE SIGNALS</button>
        <p style="text-align: center; font-size: 10px; color: #64748b; margin-top: 15px;">NEXT 15M FORECAST | AUTO-REFRESH: 30S</p>
    </div>

    <script>
        async function getPrice(symbol) {
            // Hum AllOrigins proxy use kar rahe hain taaki "Error" na aaye
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?interval=15m&range=1d')}`;
            const res = await fetch(url);
            const data = JSON.parse((await res.json()).contents);
            return data.chart.result[0];
        }

        async function updateAll() {
            const nPrice = document.getElementById('n-price');
            const sPrice = document.getElementById('s-price');
            const nSig = document.getElementById('n-sig');
            const sSig = document.getElementById('s-sig');
            const nCard = document.getElementById('n-card');
            const sCard = document.getElementById('s-card');

            try {
                const [nData, sData] = await Promise.all([getPrice('^NSEI'), getPrice('^BSESN')]);

                const process = (data, pEl, sEl, cEl) => {
                    const current = data.meta.regularMarketPrice;
                    const history = data.indicators.quote[0].close;
                    const prev = history[history.length - 2];
                    
                    pEl.innerText = current.toLocaleString('en-IN');
                    
                    if (current > prev) {
                        sEl.innerText = "↑ 15M BUY (UP)";
                        sEl.style.color = "#10b981";
                        cEl.style.borderLeftColor = "#10b981";
                    } else {
                        sEl.innerText = "↓ 15M SELL (DOWN)";
                        sEl.style.color = "#ef4444";
                        cEl.style.borderLeftColor = "#ef4444";
                    }
                };

                process(nData, nPrice, nSig, nCard);
                process(sData, sPrice, sSig, sCard);

            } catch (e) {
                console.log("Error fetching data", e);
                nSig.innerText = "RETRYING...";
            }
        }

        window.onload = updateAll;
        setInterval(updateAll, 30000);
    </script>
</body>
</html>
