<!-- Nifty 50 Chart -->
<div style="margin: 30px auto; max-width: 650px;">
  <h3>Nifty 50 Live Chart</h3>
  <div id="nifty-chart" style="height: 420px;"></div>
</div>

<!-- Sensex Chart -->
<div style="margin: 30px auto; max-width: 650px;">
  <h3>Sensex Live Chart</h3>
  <div id="sensex-chart" style="height: 420px;"></div>
</div>

<!-- TradingView Script -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  // Nifty 50 - Fixed Symbol
  new TradingView.widget({
    "width": "100%",
    "height": 420,
    "symbol": "NSE:NIFTY",          // यही मुख्य symbol है
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "nifty-chart"
  });

  // Sensex - Already working
  new TradingView.widget({
    "width": "100%",
    "height": 420,
    "symbol": "BSE:SENSEX",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "sensex-chart"
  });
</script>
