<!-- Nifty 50 Chart - Bigger Size -->
<div style="margin: 30px auto; max-width: 700px; width: 100%;">
  <h3>Nifty 50 Live Chart</h3>
  <div id="nifty-chart" style="height: 520px; width: 100%;"></div>   <!-- Height बढ़ाई -->
</div>

<!-- Sensex Chart - Bigger Size -->
<div style="margin: 30px auto; max-width: 700px; width: 100%;">
  <h3>Sensex Live Chart</h3>
  <div id="sensex-chart" style="height: 520px; width: 100%;"></div>   <!-- Height बढ़ाई -->
</div>

<!-- TradingView Script -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  // Nifty 50 Chart (Bigger + Symbol Fix की कोशिश)
  new TradingView.widget({
    "width": "100%",
    "height": 520,                    // ← Size बढ़ाई (520px)
    "symbol": "NSEIX:NIFTY1!",        // Gift Nifty symbol (notification कम करने की कोशिश)
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "nifty-chart"
  });

  // Sensex Chart (Bigger)
  new TradingView.widget({
    "width": "100%",
    "height": 520,                    // ← Size बढ़ाई (520px)
    "symbol": "BSE:SENSEX",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "sensex-chart"
  });
</script>
