
<!-- Nifty 50 Chart (Fixed) -->
<div style="margin: 30px auto; max-width: 650px;">
  <h3>Nifty 50 Live Chart</h3>
  <div id="nifty-chart" style="height: 420px;"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  // Fixed Nifty Chart - Gift Nifty symbol
  new TradingView.widget({
    "width": "100%",
    "height": 420,
    "symbol": "NSEIX:NIFTY1!",     // ← ये बदलाव करो
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "nifty-chart"
  });

  // Sensex Chart (जैसा पहले था, वो ठीक है)
  new TradingView.widget({
    "width": "100%",
    "height": 420,
    "symbol": "BSE:SENSEX",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "hideideas": true,
    "container_id": "sensex-chart"
  });
</script>
