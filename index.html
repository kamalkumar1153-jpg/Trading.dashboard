<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal v2</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .card { background: #1e2329; border-radius: 15px; padding: 20px; width: 280px; border: 1px solid #30363d; }
        .price { font-size: 2.2rem; font-weight: bold; color: #f0b90b; }
        .signal { margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold; }
        .buy { background: #2ebd85; color: white; }
        .sell { background: #f6465d; color: white; }
        .neutral { background: #474d57; color: white; }
    </style>
</head>
<body>
    <h1>🚀 AI PRO TERMINAL V2 🚀</h1>
    <div id="display" class="grid">Loading Advanced Signals...</div>
    <script>
        async function loadData() {
            const res = await fetch('data.json?t=' + Date.now());
            const data = await res.json();
            let html = '';
            for(let k in data) {
                let sigClass = data[k].signal.includes('BUY') ? 'buy' : (data[k].signal.includes('SELL') ? 'sell' : 'neutral');
                html += `<div class="card">
                    <h3>${k}</h3>
                    <div class="price">₹${data[k].price}</div>
                    <p>RSI: ${data[k].rsi}</p>
                    <div class="signal ${sigClass}">${data[k].signal}</div>
                </div>`;
            }
            document.getElementById('display').innerHTML = html;
        }
        setInterval(loadData, 10000);
        loadData();
    </script>
</body>
</html>
