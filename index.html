<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V2 - Live</title>
    <style>
        body { background-color: #051125; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
        .title h1 { color: #4facfe; margin: 0; font-size: 22px; line-height: 1.2; }
        .title p { color: #8892b0; margin: 5px 0; font-size: 12px; }
        
        .clock-card { background: #112240; padding: 10px 20px; border-radius: 12px; text-align: center; border: 1px solid #1d2d50; }
        .clock-card div { font-size: 20px; font-weight: bold; }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        /* Widget Container Styling */
        .index-card { 
            background: #112240; 
            border-radius: 12px; 
            border: 1px solid #1d2d50;
            height: 100px; 
            overflow: hidden;
            position: relative;
        }

        .status-box { 
            background: #0d1b35; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #1d2d50; 
        }
        .status-box h3 { border-bottom: 1px solid #1d2d50; padding-bottom: 10px; margin-top: 0; font-size: 16px; }

        .indicator { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1d2d50; }
        .val { color: #64ffda; font-weight: bold; }

        .forecast-btn {
            background: linear-gradient(to right, #2563eb, #3b82f6);
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">
            <h1>AI PRO<br>TERMINAL V2</h1>
            <p>Kamal-Trader Dashboard</p>
        </div>
        <div class="clock-card">
            <div id="time">--:--:--</div>
            <span id="ampm" style="font-size: 12px; color: #8892b0;">PM</span>
        </div>
    </div>

    <div class="market-grid">
        <div class="index-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                {
                  "symbol": "BSE:SENSEX",
                  "width": "100%", "height": "100%", "locale": "en", "dateRange": "1D",
                  "colorTheme": "dark", "isTransparent": true, "autosize": true, "largeChartUrl": ""
                }
                </script>
            </div>
        </div>

        <div class="index-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                {
                  "symbol": "NSE:NIFTY",
                  "width": "100%", "height": "100%", "locale": "en", "dateRange": "1D",
                  "colorTheme": "dark", "isTransparent": true, "autosize": true, "largeChartUrl": ""
                }
                </script>
            </div>
        </div>
    </div>

    <div class="status-box">
        <h3>AI TECHNICAL STATUS</h3>
        <div class="indicator">
            <span>RSI (14):</span> <span class="val" id="rsi-val">--</span>
        </div>
        <div class="indicator">
            <span>EMA (20):</span> <span class="val" id="ema-val">--</span>
        </div>

        <div class="forecast-btn">
            <div style="font-size: 10px; opacity: 0.8; margin-bottom: 5px;">NEXT 15M FORECAST</div>
            <div id="signal">➔ ANALYZING...</div>
        </div>
    </div>

    <script>
        // Real-time Clock logic
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time').innerText = `${h}:${m}:${s}`;
            document.getElementById('ampm').innerText = ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Simulated AI Logic (Isse aap baad mein API se connect kar sakte hain)
        setTimeout(() => {
            document.getElementById('rsi-val').innerText = "62.45";
            document.getElementById('ema-val').innerText = "22,480.10";
            document.getElementById('signal').innerText = "➔ NEUTRAL / BULLISH";
        }, 2000);
    </script>
</body>
</html>
