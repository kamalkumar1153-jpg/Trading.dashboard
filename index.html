<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal AI Terminal</title>
    <style>
        body { background: #051125; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .card { background: #112240; padding: 15px; border-radius: 12px; border: 1px solid #1d2d50; }
        .price { font-size: 24px; color: #64ffda; font-weight: bold; }
        .signal-btn { background: #1e40af; padding: 15px; margin: 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>AI PRO TERMINAL V2.5</h2>
    <div class="grid">
        <div class="card"><small>NIFTY 50</small><div class="price" id="n-val">...</div></div>
        <div class="card"><small>SENSEX</small><div class="price" id="s-val">...</div></div>
    </div>
    <div class="signal-btn" id="sig">CONNECTING...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://market--treminal-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        firebase.database().ref('market_data').on('value', (snap) => {
            const val = snap.val();
            if(val) {
                document.getElementById('n-val').innerText = val.nifty;
                document.getElementById('s-val').innerText = val.sensex;
                document.getElementById('sig').innerText = "SIGNAL: " + val.signal;
            }
        });
    </script>
</body>
</html>
