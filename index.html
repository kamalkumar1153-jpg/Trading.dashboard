<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        databaseURL: "https://market--treminal-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Clock & Session Logic (Jo aapne likha tha)
    function updateClock() {
        const now = new Date();
        let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
        let ampm = h >= 12 ? 'PM' : 'AM';
        
        const day = now.getDay();
        const timeVal = h * 100 + parseInt(m);
        const isOpen = (day !== 0 && day !== 6) && timeVal >= 915 && timeVal <= 1530;
        
        const sessionEl = document.getElementById('mkt-session');
        sessionEl.innerText = isOpen ? "● MARKET OPEN" : "● MARKET CLOSED";
        sessionEl.style.color = isOpen ? "#64ffda" : "#ff4d4d";
        sessionEl.style.borderColor = isOpen ? "#64ffda" : "#ff4d4d";

        h = h % 12 || 12;
        document.getElementById('time').innerText = `${String(h).padStart(2, '0')}:${m}:${s}`;
        document.getElementById('ampm').innerText = ampm;
    }
    setInterval(updateClock, 1000);

    // 3. Real-Time Firebase Listener
    // Ab random movement ki jagah Firebase se data aayega
    database.ref('market_signal').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Price Update
            document.getElementById('nifty-val').innerText = parseFloat(data.price).toLocaleString('en-IN');
            
            // RSI & Pulse Bar Update
            const rsi = data.rsi;
            document.getElementById('rsi-val').innerText = rsi;
            document.getElementById('pulse-fill').style.width = rsi + "%";

            // Signal Box Update
            const fBox = document.getElementById('forecast-box');
            const sText = document.getElementById('signal-text');

            if (data.signal === "UP") {
                fBox.className = "forecast-btn glow-buy";
                sText.innerText = "➔ STRONG BUY SIGNAL";
                fBox.style.background = "linear-gradient(135deg, #065f46, #059669)"; // Greenish
            } else if (data.signal === "DOWN") {
                fBox.className = "forecast-btn";
                sText.innerText = "➔ STRONG SELL SIGNAL";
                fBox.style.background = "linear-gradient(135deg, #991b1b, #dc2626)"; // Reddish
            } else {
                fBox.className = "forecast-btn";
                sText.innerText = "➔ NEUTRAL / WAIT";
                fBox.style.background = "linear-gradient(135deg, #1e40af, #3b82f6)"; // Default Blue
            }
        }
    });
</script>
