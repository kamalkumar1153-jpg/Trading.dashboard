<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V9.5 (Upstox Live)</title>
    <style>
        :root { --bg: #050a14; --card: #0f172a; --accent: #00f2ff; --up: #00ff88; --down: #ff3366; --neutral: #facc15; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { width: 92%; max-width: 400px; background: var(--card); padding: 22px; border-radius: 28px; border: 1px solid #1e293b; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .mini-card { background: #1e293b; padding: 14px; border-radius: 18px; text-align: center; border: 1px solid #334155; }
        .label { color: #94a3b8; font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; }
        .price { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; display: block; margin-top: 5px; font-weight: 700; }
        .main-signal { background: #0a111f; padding: 22px; border-radius: 22px; border: 2px solid #1e293b; text-align: center; }
        #sig-text { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
        .indicators-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; font-size: 0.75rem; margin-bottom: 15px; }
        .strength-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #strength-bar { width: 0%; height: 100%; transition: 0.4s ease; }
        .status-msg { font-size: 0.85rem; font-weight: 600; color: var(--accent); margin-top: 12px; display: block; }
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 16px; font-weight: 800; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="terminal">
        <div style="text-align: center; margin-bottom: 10px;">
            <span style="font-size: 0.6rem; color: #00ff88; letter-spacing: 2px;">● UPSTOX REAL-TIME SYNC</span>
        </div>
        
        <div class="market-grid">
            <div class="mini-card">
                <span class="label">NIFTY 50</span>
                <span class="price" id="n-price">00,000.00</span>
            </div>
            <div class="mini-card">
                <span class="label">SENSEX</span>
                <span class="price" id="s-price">00,000.00</span>
            </div>
        </div>

        <div class="main-signal" id="sig-card">
            <div id="sig-text">CONNECTING...</div>
            
            <div class="indicators-bar">
                <span>MOMENTUM: <b id="m-val">0.00</b></span>
                <span>TREND: <b id="c-stat">---</b></span>
            </div>

            <div class="strength-bg">
                <div id="strength-bar"></div>
            </div>
            <span class="status-msg" id="status-msg">Fetching Live Ticks</span>
        </div>

        <button class="btn" onclick="updateLogic()">FORCE REFRESH</button>
        <p style="text-align: center; font-size: 8px; color: #475569; margin-top: 15px;">ZERO LATENCY | TERMUX BRIDGE ACTIVE</p>
    </div>

    <script>
        async function updateLogic() {
            try {
                // Kamal Bhai, aapka live tunnel link yahan hai:
                const res = await fetch('https://f758fa37cdcdc77c-223-185-14-196.serveousercontent.com/market-data');
                const json = await res.json();
                
                const nData = json.data['NSE_INDEX|Nifty 50'];
                const sData = json.data['NSE_INDEX|SENSEX'];
                
                if(!nData) { throw new Error("No Data"); }

                const nCurr = nData.last_price;
                const sCurr = sData.last_price;
                const nClose = nData.ohlc.close;

                document.getElementById('n-price').innerText = nCurr.toLocaleString('en-IN');
                document.getElementById('s-price').innerText = sCurr.toLocaleString('en-IN');

                const momentum = (nCurr - nClose).toFixed(2);
                document.getElementById('m-val').innerText = momentum;

                const isBullish = nCurr > nClose;
                const trendEl = document.getElementById('c-stat');
                trendEl.innerText = isBullish ? "BULLISH" : "BEARISH";
                trendEl.style.color = isBullish ? "var(--up)" : "var(--down)";

                const sigT = document.getElementById('sig-text');
                const sBar = document.getElementById('strength-bar');
                const msg = document.getElementById('status-msg');

                if (isBullish && momentum > 10) {
                    sigT.innerText = "🚀 STRONG BUY"; sigT.style.color = "var(--up)";
                    sBar.style.width = "100%"; sBar.style.backgroundColor = "var(--up)";
                    msg.innerText = "Upstox: High Momentum Bullish";
                } else if (!isBullish && momentum < -10) {
                    sigT.innerText = "💥 STRONG SELL"; sigT.style.color = "var(--down)";
                    sBar.style.width = "100%"; sBar.style.backgroundColor = "var(--down)";
                    msg.innerText = "Upstox: Heavy Selling Pressure";
                } else {
                    sigT.innerText = "WAITING"; sigT.style.color = "var(--neutral)";
                    sBar.style.width = "35%"; sBar.style.backgroundColor = "var(--neutral)";
                    msg.innerText = "Consolidating - No Setup";
                }
            } catch (e) {
                document.getElementById('status-msg').innerText = "Live Bridge: Connecting...";
                document.getElementById('sig-text').innerText = "CONNECTING...";
            }
        }
        setInterval(updateLogic, 1000); // 1 Second Refresh
    </script>
</body>
</html>
