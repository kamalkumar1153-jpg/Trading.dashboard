<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V2 - No Chart</title>
    <style>
        body { background-color: #0a192f; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 25px; }
        .title h1 { color: #4facfe; margin: 0; font-size: 24px; font-weight: bold; }
        .title p { color: #8892b0; margin: 5px 0; font-size: 13px; }
        
        .clock-card { background: #112240; padding: 12px 18px; border-radius: 12px; text-align: center; border: 1px solid #233554; }
        .clock-card div { font-size: 22px; font-weight: bold; letter-spacing: 1px; }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .index-card { 
            background: #112240; 
            padding: 20px 15px; 
            border-radius: 15px; 
            border: 1px solid #233554;
            display: flex;
            flex-direction: column;
        }
        .index-card small { color: #8892b0; font-weight: bold; font-size: 11px; margin-bottom: 8px; }
        .price { font-size: 20px; font-weight: bold; color: #ffffff; }

        .status-box { 
            background: #112240; 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid #233554; 
        }
        .status-box h3 { border-bottom: 1px solid #233554; padding-bottom: 12px; margin-top: 0; font-size: 16px; color: #ccd6f6; }

        .indicator { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #233554; }
        .val { color: #64ffda; font-weight: 500; }

        .forecast-btn {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            margin-top: 25px;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">
            <h1>AI PRO<br>TERMINAL V2</h1>
            <p>Kamal-Trader Dashboard</p>
        </div>
        <div class="clock-card">
            <div id="time">00:00:00</div>
            <span id="ampm" style="font-size: 12px; color: #8892b0;">AM</span>
        </div>
    </div>

    <div class="market-grid">
        <div class="index-card">
            <small>SENSEX</small>
            <div class="price" id="sensex-val">74,106.85</div>
        </div>

        <div class="index-card">
            <small>NIFTY 50</small>
            <div class="price" id="nifty-val">22,968.25</div>
        </div>
    </div>

    <div class="status-box">
        <h3>AI TECHNICAL STATUS</h3>
        <div class="indicator">
            <span>RSI (14):</span> <span class="val" id="rsi-val">62.45</span>
        </div>
        <div class="indicator">
            <span>EMA (20):</span> <span class="val" id="ema-val">22,480.10</span>
        </div>

        <div class="forecast-btn">
            <div style="font-size: 11px; opacity: 0.8; margin-bottom: 5px; letter-spacing: 1px;">NEXT 15M FORECAST</div>
            <div id="signal">➔ NEUTRAL / BULLISH</div>
        </div>
    </div>

    <script>
        // Clock Function
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time').innerText = `${h}:${m}:${s}`;
            document.getElementById('ampm').innerText = ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Data Update Function (Simulating live movement)
        function updateMarketData() {
            // Yahan aap apna fetch(API_URL) code dal sakte hain
            // Filhal movement dikhane ke liye random values use ho rahi hain
            let sensexBase = 74,106.85;
            let niftyBase = 22,968.25;
            
            setInterval(() => {
                let sChange = (Math.random() * 10 - 5).toFixed(2);
                let nChange = (Math.random() * 5 - 2.5).toFixed(2);
                
                document.getElementById('sensex-val').innerText = (parseFloat(sensexBase) + parseFloat(sChange)).toLocaleString('en-IN');
                document.getElementById('nifty-val').innerText = (parseFloat(niftyBase) + parseFloat(nChange)).toLocaleString('en-IN');
            }, 3000);
        }

        updateMarketData();
    </script>
</body>
</html>
