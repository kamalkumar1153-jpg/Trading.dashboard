<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V2.5</title>
    <style>
        :root { --bg: #051125; --card: #112240; --accent: #64ffda; --bearish: #ff4d4d; --border: #1d2d50; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
        .title h1 { color: #4facfe; margin: 0; font-size: 22px; font-weight: bold; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .index-card { background: var(--card); padding: 18px 12px; border-radius: 15px; border: 1px solid var(--border); }
        .status-box { background: var(--card); padding: 18px; border-radius: 18px; border: 1px solid var(--border); }
        .indicator { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .val { color: var(--accent); font-weight: bold; }
        .forecast-btn { background: #3b82f6; margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">
            <h1>AI PRO TERMINAL</h1>
            <div id="mkt-session" style="font-size: 10px; color: var(--accent);">● LIVE FEED</div>
        </div>
    </div>

    <div class="market-grid">
        <div class="index-card"><small>NIFTY 50</small><div class="val" id="nifty-val">Loading...</div></div>
        <div class="index-card"><small>RSI (14)</small><div class="val" id="rsi-val">--</div></div>
    </div>

    <div class="status-box">
        <div class="indicator"><span>SIGNAL:</span> <span id="signal-text">CONNECTING...</span></div>
        <div class="forecast-btn" id="main-btn">WAITING FOR DATA</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://market--treminal-default-rtdb.firebaseio.com"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            database.ref('market_signal').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('nifty-val').innerText = data.price || "0.0";
                    document.getElementById('rsi-val').innerText = data.rsi || "0.0";
                    document.getElementById('signal-text').innerText = data.signal || "NEUTRAL";
                    document.getElementById('main-btn').innerText = "➔ NEXT: " + (data.signal || "WAIT");
                }
            });
        } catch (e) {
            console.log("Firebase Error: ", e);
            document.body.innerHTML = "<h2 style='color:red; text-align:center;'>Code Error! Check Console.</h2>";
        }
    </script>
</body>
</html>
