<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V2</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-color: #ccd6f6;
            --accent: #64ffda;
            --border: #233554;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-section h1 {
            color: #4facfe;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .clock-card {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .index-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .status-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .indicator-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #233554;
        }

        .forecast-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-section">
            <h1>AI PRO<br>TERMINAL V2</h1>
            <small style="color: #8892b0;">Kamal-Trader Dashboard</small>
        </div>
        <div class="clock-card">
            <div id="clock" style="font-size: 20px; font-weight: bold;">00:00:00</div>
            <div id="ampm">AM</div>
        </div>
    </div>

    <div class="market-grid">
        <div class="index-card">
            <small>SENSEX</small>
            <div id="sensex-price" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;">--</div>
        </div>
        <div class="index-card">
            <small>NIFTY 50</small>
            <div id="nifty-price" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;">--</div>
        </div>
    </div>

    <div class="status-box">
        <h3 style="margin-top: 0; border-bottom: 1px solid #233554; padding-bottom: 10px;">AI TECHNICAL STATUS</h3>
        
        <div class="indicator-row">
            <span>RSI (14):</span>
            <span id="rsi-val" style="color: var(--accent);">--</span>
        </div>
        <div class="indicator-row">
            <span>EMA (20):</span>
            <span id="ema-val" style="color: var(--accent);">--</span>
        </div>

        <div class="forecast-btn">
            <small>NEXT 15M FORECAST</small>
            <div id="forecast-status">➔ ANALYZING...</div>
        </div>
        
        <p class="error-msg" id="interval-error" style="display:none;">
            * Note: Intraday intervals for Sensex might require a Premium API Key.
        </p>
    </div>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('ampm').textContent = ampm;
        }
        setInterval(updateClock, 1000);

        // Simulated Data Fetching (Replace with your actual API Logic)
        async function fetchMarketData() {
            try {
                // Example: yfinance ya AlphaVantage use karte waqt 
                // Sensex (^BSESN) ke liye daily data hi free milta hai.
                // Nifty (NIFTY BEES ya ^NSEI) par intraday try karein.
                
                document.getElementById('sensex-price').innerText = "74,248.22";
                document.getElementById('nifty-price').innerText = "22,514.65";
                
                document.getElementById('rsi-val').innerText = "62.45";
                document.getElementById('ema-val').innerText = "22,480.10";
                
                document.getElementById('forecast-status').innerText = "➔ NEUTRAL / BULLISH";
            } catch (error) {
                console.log("Error fetching data");
            }
        }

        // Run on load
        fetchMarketData();
        updateClock();
    </script>
</body>
</html>
