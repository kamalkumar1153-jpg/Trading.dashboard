<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        
        /* 🔥 Arrow Animation & Neon Effect */
        @keyframes neonGlowGreen { 0% { text-shadow: 0 0 10px #39ff14; } 50% { text-shadow: 0 0 20px #39ff14, 0 0 30px #39ff14; } 100% { text-shadow: 0 0 10px #39ff14; } }
        @keyframes neonGlowRed { 0% { text-shadow: 0 0 10px #ff3131; } 50% { text-shadow: 0 0 20px #ff3131, 0 0 30px #ff3131; } 100% { text-shadow: 0 0 10px #ff3131; } }
        @keyframes bounceArrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .neon-green { color: #39ff14; animation: neonGlowGreen 1.5s infinite; }
        .neon-red { color: #ff3131; animation: neonGlowRed 1.5s infinite; }
        .neon-yellow { color: #fbbf24; }
        .arrow-up { display: inline-block; transform: rotate(-45deg); animation: bounceArrow 1s infinite; }
        .arrow-down { display: inline-block; transform: rotate(135deg); animation: bounceArrow 1s infinite; }
        .arrow-side { display: inline-block; transform: rotate(90deg); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">AI PRO <span class="text-white">TERMINAL V2</span></h1>
            <p class="text-xs text-gray-400">Kamal-Trader Dashboard</p>
        </div>
        <div id="live-clock" class="bg-gray-800 px-4 py-2 rounded-lg font-mono text-xl border border-blue-500/50">00:00:00</div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="glass-card p-4">
            <p class="text-gray-400 text-xs uppercase">SENSEX</p>
            <h2 id="sensex-price" class="text-xl font-bold">--</h2>
            <p id="sensex-change" class="text-sm font-bold">--</p>
        </div>
        <div class="glass-card p-4">
            <p class="text-gray-400 text-xs uppercase">NIFTY 50</p>
            <h2 id="nifty-price" class="text-xl font-bold">--</h2>
            <p id="nifty-change" class="text-sm font-bold">--</p>
        </div>
    </div>

    <div class="glass-card p-4 mb-6">
        <h3 class="text-sm font-bold mb-4 border-b border-gray-700 pb-2">AI TECHNICAL STATUS</h3>
        <div class="space-y-4">
            <div class="flex justify-between">
                <span class="text-gray-400">RSI (14):</span>
                <span id="rsi-val" class="font-bold text-blue-400">--</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">EMA (20):</span>
                <span id="ema-val" class="font-bold">--</span>
            </div>
            
            <div class="mt-4 p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg text-center">
                <p class="text-[10px] text-blue-300 uppercase tracking-widest">Next 15m Forecast</p>
                <div class="flex items-center justify-center gap-2 mt-1">
                    <span id="trend-arrow" class="text-3xl">→</span>
                    <h4 id="prediction-text" class="text-lg font-black text-white">ANALYZING...</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card overflow-hidden h-[300px]">
        <div id="tradingview_widget"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. TradingView Widget Configuration
        new TradingView.widget({
            "autosize": true, "symbol": "BSE:SENSEX", "interval": "15",
            "timezone": "Asia/Kolkata", "theme": "dark", "style": "1",
            "locale": "in", "toolbar_bg": "#f1f3f6", "enable_publishing": false,
            "hide_top_toolbar": true, "container_id": "tradingview_widget"
        });

        // 2. Live Clock
        function updateClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-IN');
        }
        setInterval(updateClock, 1000);

        // 3. Firebase Integration & Prediction Logic
        const FIREBASE_URL = "https://ai-pro-terminal-default-rtdb.firebaseio.com/market_data.json";

        async function fetchMarketData() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                if (data) {
                    // Prices
                    document.getElementById('sensex-price').innerText = data.sensex_price.toLocaleString('en-IN');
                    document.getElementById('nifty-price').innerText = data.nifty_price.toLocaleString('en-IN');
                    
                    // Changes
                    const sChange = document.getElementById('sensex-change');
                    sChange.innerText = (data.sensex_change >= 0 ? "+" : "") + data.sensex_change + "%";
                    sChange.className = data.sensex_change >= 0 ? "text-green-500" : "text-red-500";

                    // Technicals
                    document.getElementById('rsi-val').innerText = data.rsi_val;
                    document.getElementById('ema-val').innerText = data.ema_20.toLocaleString('en-IN');

                    // 🔥 Updated 15m Prediction Logic with Arrows
                    const predBox = document.getElementById('prediction-text');
                    const trendArrow = document.getElementById('trend-arrow');

                    if (data.rsi_val > 65) {
                        predBox.innerText = "SLIGHT BEARISH";
                        predBox.className = "text-lg font-black neon-red";
                        trendArrow.innerText = "↓";
                        trendArrow.className = "text-3xl neon-red arrow-down";
                    } else if (data.rsi_val < 35) {
                        predBox.innerText = "BULLISH REVERSAL";
                        predBox.className = "text-lg font-black neon-green";
                        trendArrow.innerText = "↑";
                        trendArrow.className = "text-3xl neon-green arrow-up";
                    } else {
                        predBox.innerText = "SIDEWAYS MOVE";
                        predBox.className = "text-lg font-black neon-yellow";
                        trendArrow.innerText = "→";
                        trendArrow.className = "text-3xl neon-yellow arrow-side";
                    }
                }
            } catch (e) { console.log("Error:", e); }
        }

        setInterval(fetchMarketData, 5000);
        fetchMarketData();
    </script>
</body>
</html>
