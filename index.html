<!-- Nifty 50 TradingView Chart -->
<div style="margin: 30px auto; max-width: 600px;">
  <h3>Nifty 50 Live Chart</h3>
  <div class="tradingview-widget-container">
    <div id="nifty-chart" style="height: 400px;"></div>
  </div>
</div>

<!-- Sensex TradingView Chart -->
<div style="margin: 30px auto; max-width: 600px;">
  <h3>Sensex Live Chart</h3>
  <div class="tradingview-widget-container">
    <div id="sensex-chart" style="height: 400px;"></div>
  </div>
</div>

<!-- TradingView Script (एक बार ही लगाओ, body के अंत में) -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  // Nifty 50 Chart
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "NSE:NIFTY",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "container_id": "nifty-chart"
  });

  // Sensex Chart
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "BSE:SENSEX",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "in",
    "toolbar_bg": "#111",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "container_id": "sensex-chart"
  });
</script>
