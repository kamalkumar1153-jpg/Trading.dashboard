<!DOCTYPE html>
<html>
<head>
    <title>Kamal Trading Bot</title>
    <meta http-equiv="refresh" content="30">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #238636; border-radius: 10px; padding: 20px; display: inline-block; margin: 10px; width: 200px; }
        .price { font-size: 24px; color: #3fb950; font-weight: bold; }
        .rsi { color: #f85149; }
    </style>
</head>
<body>
    <h1>🚀 KAMAL LIVE TRADING 🚀</h1>
    <div id="display"></div>
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            let html = '';
            for(let key in data) {
                html += `<div class="box">
                            <h3>${key}</h3>
                            <div class="price">₹${data[key].price}</div>
                            <div class="rsi">RSI: ${data[key].rsi}</div>
                         </div>`;
            }
            document.getElementById('display').innerHTML = html;
        });
    </script>
</body>
</html>
