<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Terminal V8.0 (PRO)</title>
    <style>
        :root { --bg: #050a14; --card: #111b2d; --accent: #00f2ff; --up: #00ff88; --down: #ff3366; --neutral: #ffcc00; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { width: 95%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 30px; border: 1px solid #1e293b; box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .mini-card { background: #0a111f; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #1e293b; }
        .label { color: #64748b; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .price { font-family: monospace; font-size: 1.1rem; display: block; margin-top: 4px; }
        .main-signal { background: #0a111f; padding: 20px; border-radius: 20px; border: 2px solid #1e293b; text-align: center; }
        #sig-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .indicators-grid { font-size: 0.75rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin: 10px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .strength-container { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; margin-top: 15px; }
        #strength-bar { width: 0%; height: 100%; border-radius: 10px; transition: 0.5s; }
        .pts-tag { font-size: 0.85rem; font-weight: 600; color: var(--accent); display: block; }
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="terminal">
        <div style="text-align: center; margin-bottom: 15px;">
            <span style="font-size: 0.7rem; color: #64748b; font-weight: bold;">LIVE ICHIMOKU + MACD SYNC (1M)</span>
        </div>
        
        <div class="market-grid">
            <div class="mini-card">
                <span class="label">NIFTY 50</span>
                <span class="price" id="n-price">---</span>
            </div>
            <div class="mini-card">
                <span class="label">SENSEX</span>
                <span class="price" id="s-price">---</span>
            </div>
        </div>

        <div class="main-signal" id="sig-card">
            <div id="sig-text">ANALYZING...</div>
            
            <div class="indicators-grid">
                <span>MACD: <b id="m-val">0.00</b></span>
                <span>CLOUD: <b id="cloud-status">---</b></span>
            </div>

            <span class="pts-tag" id="target-pts">Waiting for Confirmation</span>
            <div class="strength-container">
                <div id="strength-bar"></div>
            </div>
        </div>

        <button class="btn" onclick="updateLogic()">REFRESH TERMINAL</button>
        <p style="text-align: center; font-size: 8px; color: #475569; margin-top: 12px; font-weight: bold;">V8.0 | DUAL CONFIRMATION ACTIVE</p>
    </div>

    <script>
        function calculateEMA(data, period) {
            let k = 2 / (period + 1);
            let ema = [data[0]];
            for (let i = 1; i < data.length; i++) {
                ema.push(data[i] * k + ema[i - 1] * (1 - k));
            }
            return ema;
        }

        function getHL(data, period) {
            let sliced = data.slice(-period);
            return { high: Math.max(...sliced), low: Math.min(...sliced) };
        }

        async function getData(sym) {
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + sym + '?interval=1m&range=1d')}`;
            const res = await fetch(url);
            return JSON.parse((await res.json()).contents).chart.result[0];
        }

        async function updateLogic() {
            const sigText = document.getElementById('sig-text');
            const targetPts = document.getElementById('target-pts');
            const sBar = document.getElementById('strength-bar');
            const mVal = document.getElementById('m-val');
            const cStat = document.getElementById('cloud-status');

            try {
                const [nData, sData] = await Promise.all([getData('^NSEI'), getData('^BSESN')]);
                const prices = nData.indicators.quote[0].close.filter(p => p != null);
                const highs = nData.indicators.quote[0].high.filter(h => h != null);
                
                const nCurr = nData.meta.regularMarketPrice;
                const sCurr = sData.meta.regularMarketPrice;
                document.getElementById('n-price').innerText = nCurr.toLocaleString('en-IN');
                document.getElementById('s-price').innerText = sCurr.toLocaleString('en-IN');

                // MACD
                const ema12 = calculateEMA(prices, 12);
                const ema26 = calculateEMA(prices, 26);
                const currentMACD = ema12[ema12.length - 1] - ema26[ema26.length - 1];
                mVal.innerText = currentMACD.toFixed(2);

                // ICHIMOKU (Base Line Logic)
                const kijunHL = getHL(highs, 26);
                const baseLine = (kijunHL.high + kijunHL.low) / 2;
                const isAboveCloud = nCurr > baseLine;
                cStat.innerText = isAboveCloud ? "ABOVE" : "BELOW";
                cStat.style.color = isAboveCloud ? "var(--up)" : "var(--down)";

                const nPrev = prices[prices.length - 2];
                const sPrev = sData.indicators.quote[0].close.slice(-2)[0];

                if (isAboveCloud && currentMACD > 0 && nCurr > nPrev && sCurr > sPrev) {
                    sigText.innerText = "☁ CLOUD BUY";
                    sigText.style.color = "var(--up)";
                    sBar.style.width = "100%";
                    sBar.style.backgroundColor = "var(--up)";
                    targetPts.innerText = "Momentum & Cloud: BULLISH";
                } else if (!isAboveCloud && currentMACD < 0 && nCurr < nPrev && sCurr < sPrev) {
                    sigText.innerText = "☁ CLOUD SELL";
                    sigText.style.color = "var(--down)";
                    sBar.style.width = "100%";
                    sBar.style.backgroundColor = "var(--down)";
                    targetPts.innerText = "Momentum & Cloud: BEARISH";
                } else {
                    sigText.innerText = "WAITING...";
                    sigText.style.color = "var(--neutral)";
                    sBar.style.width = "30%";
                    sBar.style.backgroundColor = "var(--neutral)";
                    targetPts.innerText = "Signals Diverging - No Trade";
                }
            } catch (e) { console.log("Syncing..."); }
        }

        window.onload = updateLogic;
        setInterval(updateLogic, 10000);
    </script>
</body>
</html>
